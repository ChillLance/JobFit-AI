<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      width: 320px;
      padding: 16px;
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: #f9fafb;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 16px;
    }
    #job-title {
      font-size: 12px;
      color: #d1d5db;
      margin-bottom: 12px;
      word-break: break-word;
      line-height: 1.4;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      font-weight: bold;
      background: #60a5fa;
      color: #111827;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #86efac;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <h3>💼 JobFlow Collector</h3>
  <div id="job-title">讀取中...</div>
  <button id="collect-btn">一鍵採集此職缺</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
